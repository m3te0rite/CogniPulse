# Number of stn-gpe units
stn_gpe_units : 16

# Number of iterations and time step
time : 40000
dt : 0.1

# Weights params
lat_sparse : 0.1
inter_sparse : 0.1

# STN-GPe params
I_strd2_gpe : 5
lat_strength_stn : 0.03 
lat_strength_gpe : 0.1
wsg_strength : 0.1
wgs_strength : 0.1
I_gpe_ext : 6
I_stn_ext : 12
binsize : 100
stn_gpe_noise: 3

# DBS Params
DBS : True
DBS_func: 'biphasicDBS_variablefreq' # 'biphasicDBS' # 'monophasicDBS', 'biphasicDBS' , 'biphasicDBS_uninoise', 'biphasicDBS_normalnoise'
DBS_amplitude : 175 #250 
DBS_freq : 30 #150
pulse_width_micro : 200 #200 microseconds
DBS_normmean : 2000 # microseconds
DBS_normstd : 1000 #4000 #200 #700 # micro seconds
# sector_wise : False
# t_sector_activation : 2000 # 10000 points is one second => 2000 points is 0.2 seconds => 5Hz

# DBS Spread
center : 7
spread_amplitude : 1 
sigma : 3